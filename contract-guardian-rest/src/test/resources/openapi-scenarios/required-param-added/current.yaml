openapi: "3.0.3"
info:
  title: User Service
  version: "1.1.0"
paths:
  /users:
    get:
      summary: List users
      operationId: listUsers
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
        - name: tenant-id
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User list
