version: "1"

sources:
  kafka:
    paths:
      - "schemas/kafka/**/*.avsc"
      - "schemas/kafka/**/*.json"
      - "schemas/kafka/**/*.proto"
    baseline: branch:main

  rest:
    paths:
      - "api/openapi/**/*.yaml"
    baseline: branch:main

rules:
  kafka:
    compatibility: BACKWARD
    # n-version-compatibility: 1  # check against last N committed versions (default: 1)
    overrides:
      - topic: "internal.*"
        compatibility: NONE

  rest:
    # n-version-compatibility: 1  # check against last N committed versions (default: 1)
    breaking:
      - endpoint-removed
      - required-param-added
      - response-field-removed
      - response-field-type-changed
      - status-code-removed
    warning:
      - response-field-deprecated
      - parameter-renamed
    ignore:
      - "/internal/**"

gate:
  block-on: breaking
