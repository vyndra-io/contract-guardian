syntax = "proto3";

package com.paymentservice.events;

option java_package = "com.paymentservice.events";
option java_outer_classname = "OrderEventProto";
option java_multiple_files = true;

// Represents an order event produced by the Order Service and published
// to the order-events Kafka topic.
message OrderEvent {
  // Unique identifier for the order.
  string id = 1;

  // Identifier of the customer who placed the order.
  string customer_id = 2;

  // Total monetary amount for the order.
  double total_amount = 3;

  // Current status of the order (e.g., PLACED, SHIPPED, DELIVERED).
  string status = 4;
}
