# =============================================================================
# Order Service - Quarkus Configuration
# =============================================================================

# Kafka broker
kafka.bootstrap.servers=localhost:9092

# --- Schema Registry (Apicurio) ---
mp.messaging.connector.smallrye-kafka.apicurio.registry.url=http://localhost:8081/apis/registry/v2

# --- Outgoing: orders topic ---
mp.messaging.outgoing.orders-out.connector=smallrye-kafka
mp.messaging.outgoing.orders-out.topic=orders
mp.messaging.outgoing.orders-out.value.serializer=io.apicurio.registry.serde.avro.AvroKafkaSerializer
mp.messaging.outgoing.orders-out.apicurio.registry.auto-register=true

# --- Outgoing: order-status-changes topic ---
mp.messaging.outgoing.order-status-changes-out.connector=smallrye-kafka
mp.messaging.outgoing.order-status-changes-out.topic=order-status-changes
mp.messaging.outgoing.order-status-changes-out.value.serializer=io.apicurio.registry.serde.avro.AvroKafkaSerializer
mp.messaging.outgoing.order-status-changes-out.apicurio.registry.auto-register=true

# --- Incoming: shipments topic (consumed from logistics service) ---
mp.messaging.incoming.shipments-in.connector=smallrye-kafka
mp.messaging.incoming.shipments-in.topic=shipments
mp.messaging.incoming.shipments-in.value.deserializer=io.apicurio.registry.serde.avro.AvroKafkaDeserializer
mp.messaging.incoming.shipments-in.apicurio.registry.use-specific-avro-reader=true
mp.messaging.incoming.shipments-in.auto.offset.reset=earliest
mp.messaging.incoming.shipments-in.group.id=order-service
mp.messaging.incoming.shipments-in.failure-strategy=dead-letter-queue
